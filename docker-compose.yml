services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deaddrop}
      POSTGRES_USER: ${POSTGRES_USER:-deaddrop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deaddrop_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deaddrop}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-deaddrop_n8n}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-deaddrop}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-deaddrop}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-deaddrop_dev}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  pipeline:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - video_output:/app/video/output

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-deaddrop}:${POSTGRES_PASSWORD:-deaddrop_dev}@postgres:5432/${POSTGRES_DB:-deaddrop}
    depends_on:
      postgres:
        condition: service_healthy

  monitoring:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  video_output:
  uptime_kuma_data:
